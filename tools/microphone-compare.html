<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microphone Database</title>
<style>
:root {
  --bg: #f9f9f7;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.1);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1a1a;
  --text-muted: #6b6b68;
  --text-faint: #a0a09c;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --tag-bg: #f1f0ea;
  --c0: #2563eb; --c1: #10b981; --c2: #f59e0b; --c3: #ef4444;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141414; --surface: #1e1e1e;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.18);
    --text: #e8e8e4; --text-muted: #8a8a86; --text-faint: #555552;
    --accent: #60a5fa; --accent-bg: #1e2d44; --tag-bg: #2a2a28;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

.app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
.sidebar { border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow: hidden; }
.main { overflow-y: auto; padding: 1.5rem; }

.sidebar-header { padding: 1rem 1rem 0.75rem; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.sidebar-header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.search-wrap { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
.search-wrap input { width: 100%; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
.search-wrap input:focus { border-color: var(--accent); }
.filters { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 4px; }
.filter-group { padding: 4px 1rem 2px; }
.filter-label { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.filters { display: flex; flex-wrap: wrap; gap: 4px; }
.filter-chip { padding: 3px 8px; border: 1px solid var(--border-strong); border-radius: 20px; font-size: 11px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.12s; }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.mic-list { flex: 1; overflow-y: auto; padding: 0.25rem 0; }
.tree-mfr { }
.tree-mfr-header { padding: 6px 1rem 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-faint); display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
.tree-mfr-header:hover { color: var(--text-muted); }
.tree-caret { font-size: 9px; transition: transform 0.15s; display: inline-block; }
.tree-mfr.collapsed .tree-caret { transform: rotate(-90deg); }
.tree-mfr.collapsed .tree-series { display: none; }
.tree-series { }
.tree-series-header { padding: 3px 1rem 3px 1.75rem; font-size: 11px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; }
.tree-series-header:hover { color: var(--text); }
.tree-series-caret { font-size: 8px; transition: transform 0.15s; display: inline-block; }
.tree-series.collapsed .tree-series-caret { transform: rotate(-90deg); }
.tree-series.collapsed .tree-series-items { display: none; }
.tree-series-items { }
.mic-item { padding: 5px 1rem 5px 2.5rem; cursor: pointer; border-left: 3px solid transparent; transition: all 0.12s; display: flex; align-items: center; gap: 8px; }
.mic-item { padding: 8px 1rem; cursor: pointer; border-left: 3px solid transparent; transition: all 0.12s; display: flex; align-items: center; gap: 8px; }
.mic-item:hover { background: var(--tag-bg); }
.mic-item.selected { border-left-color: var(--c0); background: var(--accent-bg); }
.mic-item.compare-1 { border-left-color: var(--c1); background: rgba(16,185,129,0.06); }
.mic-item.compare-2 { border-left-color: var(--c2); background: rgba(245,158,11,0.06); }
.mic-item.compare-3 { border-left-color: var(--c3); background: rgba(239,68,68,0.06); }
.mic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mic-item-info { flex: 1; min-width: 0; }
.mic-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mic-item-sub { font-size: 11px; color: var(--text-muted); }
.mic-item-cb { width: 14px; height: 14px; flex-shrink: 0; }

.section { margin-bottom: 2rem; }
.section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

/* Spec table */
.spec-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
.spec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.spec-table th { padding: 8px 12px; text-align: left; font-weight: 500; color: var(--text-muted); font-size: 11px; background: var(--tag-bg); border-bottom: 1px solid var(--border); white-space: nowrap; }
.spec-table th.mic-col { color: var(--text); font-size: 12px; font-weight: 600; }
.spec-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.spec-table tr:last-child td { border-bottom: none; }
.spec-table .row-label { color: var(--text-muted); font-size: 12px; }
.spec-table td.best { color: #059669; font-weight: 500; }
.spec-table td.worst { color: #dc2626; }
.spec-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; }
.badge-cardioid { background: #dbeafe; color: #1d4ed8; }
.badge-supercardioid { background: #ede9fe; color: #5b21b6; }
.badge-omni { background: #d1fae5; color: #065f46; }
.badge-widecardioid { background: #fef3c7; color: #92400e; }
.badge-shotgun { background: #fce7f3; color: #9d174d; }
@media (prefers-color-scheme: dark) {
  .badge-cardioid { background: #1e3a5f; color: #93c5fd; }
  .badge-supercardioid { background: #2e1e5f; color: #c4b5fd; }
  .badge-omni { background: #064e3b; color: #6ee7b7; }
  .badge-widecardioid { background: #451a03; color: #fcd34d; }
  .badge-shotgun { background: #4a1942; color: #f9a8d4; }
}

/* Mic image cards */
.mic-card-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.th-mic-img { width: 100%; height: 100px; object-fit: contain; background: var(--tag-bg); padding: 8px; display: block; border-radius: 6px; margin-bottom: 4px; }
.th-mic-img-placeholder { width: 100%; height: 100px; background: var(--tag-bg); display: flex; align-items: center; justify-content: center; color: var(--text-faint); border-radius: 6px; margin-bottom: 4px; }
.mic-link-btn { display: block; text-align: center; font-size: 11px; padding: 4px 8px; margin-bottom: 4px; border: 0.5px solid var(--border-strong); border-radius: 5px; color: var(--accent); text-decoration: none; white-space: nowrap; }
.mic-link-btn:hover { background: var(--accent-bg); }

/* Diagrams */
.diagrams-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.diagram-card { border: 1px solid var(--border); border-radius: 10px; padding: 1rem; background: var(--surface); }
.diagram-card h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }

/* Freq controls */
.freq-controls { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 8px; }
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.slider-row input[type=range] { flex: 1; }
.freq-display { font-size: 13px; font-weight: 700; min-width: 52px; text-align: right; }
.freq-btns { display: flex; flex-wrap: wrap; gap: 4px; }
.freq-btn { padding: 3px 8px; border: 1px solid var(--border-strong); border-radius: 5px; font-size: 11px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.1s; }
.freq-btn.active { color: #fff; border-color: transparent; }

/* Polar grid */
.polar-grid { display: grid; gap: 0.5rem; }
.polar-item { display: flex; flex-direction: column; align-items: center; }
.polar-label { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
canvas.polar-canvas { display: block; }

/* Freq response */
canvas.freqresp-canvas { width: 100%; display: block; }

/* Noise calculator */
.noise-calc { border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; background: var(--surface); }
.noise-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
.noise-field label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; }
.noise-field select, .noise-field input { width: 100%; padding: 6px 8px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; }
.noise-presets { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 0.5rem; }
.noise-preset { padding: 3px 8px; border: 1px solid var(--border-strong); border-radius: 20px; font-size: 11px; cursor: pointer; background: transparent; color: var(--text-muted); }
.noise-preset:hover { border-color: var(--accent); color: var(--accent); }
.noise-table-wrap { overflow-x: auto; margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem; }
.noise-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.noise-table th, .noise-table td { padding: 5px 10px; text-align: right; border-bottom: 1px solid var(--border); }
.noise-table th:first-child, .noise-table td:first-child { text-align: left; }
.noise-table th { color: var(--text-muted); font-weight: 500; font-size: 11px; }
.noise-table tr:last-child td { border-bottom: none; }

.empty { padding: 3rem 1rem; text-align: center; color: var(--text-muted); }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; }
  .diagrams-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Microphone Database</h1>
      <p id="mic-count">Loading...</p>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search microphones..." autocomplete="off">
    </div>
    <div class="filter-group">
      <div class="filter-label">Pattern</div>
      <div class="filters" id="pattern-filters"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Transducer</div>
      <div class="filters" id="transducer-filters"></div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Diaphragm</div>
      <div class="filters" id="diaphragm-filters"></div>
    </div>
    <div class="mic-list" id="mic-list"></div>
  </aside>
  <main class="main">
    <div id="content">
      <div class="empty">
        <p style="font-size:13px">Select a microphone to view specifications and diagrams.<br>Check the box next to multiple microphones to compare.</p>
      </div>
    </div>
  </main>
</div>

<script src="../database/microphones_db.js"></script>
<script>
// ── constants ──────────────────────────────────────────────
const POLAR_FREQS = [100,125,160,200,250,315,400,500,630,800,1000,1250,1600,2000,2500,3150,4000,5000,6300,8000,10000,16000];
const QUICK_FREQS = [250,500,1000,2000,4000,8000,16000];
const COLORS = ['#2563eb','#10b981','#f59e0b','#ef4444'];
const PATTERN_LABELS = {cardioid:'Cardioid',supercardioid:'Supercardioid',omni:'Omni',widecardioid:'Wide cardioid','figure-8':'Figure-8',multi:'Multi-pattern',shotgun:'Shotgun'};
const TRANSDUCER_LABELS = {condenser:'Condenser',dynamic:'Dynamic',ribbon:'Ribbon',electret:'Electret'};
const DIAPHRAGM_LABELS = {small:'Small diaphragm',large:'Large diaphragm'};

// image path: /images/microphones/<manufacturer>/<series>/<model>.jpg
// We'll try jpg, fall back to placeholder
function imgBasePath(m) {
  const mfr = (m.manufacturer || '').toLowerCase().replace(/\s+/g, '-');
  const series = (m.series || m.type || 'studio').toLowerCase().replace(/\s+/g, '-');
  const model = (m.model || '').toLowerCase().replace(/\s+/g, '-');
  return `/images/microphones/${mfr}/${series}/${model}`;
}

// Try formats in order: webp, png, jpg — attach to <img> via JS after DOM insertion
function setMicImg(imgEl, placeholder, base) {
  const formats = ['webp','png','jpg','jpeg'];
  let idx = 0;
  function tryNext() {
    if (idx >= formats.length) {
      imgEl.style.display = 'none';
      placeholder.style.display = 'flex';
      return;
    }
    imgEl.onerror = tryNext;
    imgEl.src = base + '.' + formats[idx++];
  }
  tryNext();
}

const MICS = Object.entries(MIC_DB).map(([name,m]) => ({...m, _name: name}));

function effectivePattern(m) {
  return m.type === 'shotgun' ? 'shotgun' : m.pattern;
}

let state = {
  selected: null,
  transducerFilter: 'all',
  diaphragmFilter: 'all',
  polarOverlay: false,
  eqSelections: {},    // micId → eq option id
  patternSelections: {}, // micId → pattern option id
  compare: [],
  freq: 1000,
  noiseN: 1,
  noiseMode: 'IEC',
  search: '',
  patternFilter: 'all'
};

// ── color helpers ───────────────────────────────────────────
function micColor(id) {
  const idx = activeMicIds().indexOf(id);
  return idx >= 0 ? COLORS[idx] : null;
}
function activeMicIds() {
  return [...state.compare].filter(Boolean);
}
function getActiveMics() {
  return activeMicIds().map(id => MICS.find(m => m.id === id)).filter(Boolean);
}
function freqColor() {
  // Use color of first checked mic, or default to COLORS[1]
  return state.compare.length > 0 ? COLORS[1] : COLORS[1];
}

// ── sidebar ─────────────────────────────────────────────────
function buildMicSelectors(mics) {
  var out = '';
  mics.forEach(function(m, mi) {
    if (!m) return;
    var eqOpts = m.eq_options || [];
    var patOpts = m.pattern_options || [];
    if (!eqOpts.length && !patOpts.length) return;
    var current = state.eqSelections[m.id] || (eqOpts[0] && eqOpts[0].id);
    var color = COLORS[mi + 1];
    var btns = '';
    eqOpts.forEach(function(opt) {
      var active = current === opt.id;
      btns += '<button data-mic="' + m.id + '" data-eq="' + opt.id + '"'
            + ' onclick="setEqOption(this.dataset.mic,this.dataset.eq)"'
            + ' style="font-size:11px;padding:2px 8px;border-radius:20px;margin-right:4px;cursor:pointer;'
            + 'border:1px solid ' + (active ? color : 'var(--border-strong)') + ';'
            + 'background:' + (active ? color : 'transparent') + ';'
            + 'color:' + (active ? '#fff' : 'var(--text-muted)') + ';">'
            + opt.label + '</button>';
    });
    var patBtns = '';
    if (patOpts.length) {
      var curPat = state.patternSelections[m.id] || patOpts[0].id;
      patOpts.forEach(function(opt) {
        var active = curPat === opt.id;
        patBtns += '<button data-mic="' + m.id + '" data-pat="' + opt.id + '"'
                 + ' onclick="setPatternOption(this.dataset.mic,this.dataset.pat)"'
                 + ' style="font-size:11px;padding:2px 8px;border-radius:20px;margin-right:4px;cursor:pointer;'
                 + 'border:1px solid ' + (active ? color : 'var(--border-strong)') + ';'
                 + 'background:' + (active ? color : 'transparent') + ';'
                 + 'color:' + (active ? '#fff' : 'var(--text-muted)') + ';">'
                 + opt.label + '</button>';
      });
    }
    var sections = '';
    if (patBtns) sections += '<span style="font-size:11px;color:var(--text-muted);margin-right:6px;">Pattern:</span>' + patBtns;
    const eqLabel = (m.eq_options||[]).some(o=>o.hpf!==undefined) ? "Filter:" : "EQ:";
    if (btns)    sections += (patBtns ? '<span style="margin:0 6px;color:var(--border-strong)">|</span>' : '')
                           + '<span style="font-size:11px;color:var(--text-muted);margin-right:6px;">' + eqLabel + '</span>' + btns;
    if (!sections) return;
    out += '<div style="margin-bottom:6px;padding:4px 8px;border-left:3px solid ' + color + ';background:' + color + '18;">'
         + sections + '</div>';
  });
  return out;
}

function setEqOption(micId, optionId) {
  state.eqSelections[micId] = optionId;
  renderContent();
}

function setPatternOption(micId, optionId) {
  state.patternSelections[micId] = optionId;
  renderContent();
}

// Override getFreqResponse to use eq selection
function getActiveMicData(m) {
  // Returns {polar_data, freq_response} for the currently selected pattern/eq
  const patOpts = m.pattern_options || [];
  const eqOpts  = m.eq_options || [];
  if (patOpts.length) {
    const selPat = state.patternSelections[m.id] || patOpts[0].id;
    const opt = patOpts.find(o => o.id === selPat) || patOpts[0];
    const fqByPat = m.freq_response_by_pattern || {};
    // Check if there's an HPF eq option selected
    const selEq = eqOpts.length ? (state.eqSelections[m.id] || eqOpts[0].id) : null;
    const eqOpt = selEq ? eqOpts.find(o => o.id === selEq) : null;
    const useHpf = eqOpt && eqOpt.hpf;
    const fqKey = opt.fq_key + (useHpf ? '_hpf' : '');
    return {
      polar_data: opt.polar_data || m.polar_data,
      freq_response: fqByPat[fqKey] || fqByPat[opt.fq_key] || m.freq_response || {},
    };
  }
  return { polar_data: m.polar_data, freq_response: m.freq_response || {} };
}

function getMicFreqResponse(m) {
  // Pattern-based mics: getActiveMicData handles pattern+filter combo
  if ((m.pattern_options || []).length) return getActiveMicData(m).freq_response;
  // EQ-only mics (e.g. U47fet): fq_key selects which stored curve to use
  const eqOpts = m.eq_options || [];
  const base = m.freq_response || {};
  if (!eqOpts.length) return base;
  const selected = state.eqSelections[m.id] || eqOpts[0].id;
  const opt = eqOpts.find(o => o.id === selected) || eqOpts[0];
  if (!opt || !opt.fq_key) return base;
  const angleKey = opt.fq_key.replace(/_flat|_rolloff|_hi|_lo|_pad/g,'');
  const data = base[opt.fq_key];
  if (!data) return base;
  return {[angleKey]: data};
}

function buildFilterRow(containerId, values, labelMap, stateKey, allLabel='All') {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '';
  values.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (state[stateKey] === v ? ' active' : '');
    btn.textContent = v === 'all' ? allLabel : (labelMap[v] || v);
    btn.dataset.filterVal = v;
    btn.dataset.filterKey = stateKey;
    btn.onclick = () => { state[stateKey] = v; renderAll(); };
    el.appendChild(btn);
  });
}

function buildSidebar() {
  const patterns = ['all', ...new Set(MICS.map(m => effectivePattern(m)).filter(Boolean))];
  buildFilterRow('pattern-filters', patterns, PATTERN_LABELS, 'patternFilter');

  const transducers = ['all', ...new Set(MICS.map(m => m.transducer).filter(Boolean))];
  buildFilterRow('transducer-filters', transducers, TRANSDUCER_LABELS, 'transducerFilter');

  const diaphragms = ['all', ...new Set(MICS.map(m => m.diaphragm).filter(Boolean))];
  buildFilterRow('diaphragm-filters', diaphragms, DIAPHRAGM_LABELS, 'diaphragmFilter');

  document.getElementById('search').oninput = e => { state.search = e.target.value.toLowerCase(); renderMicList(); };
}

function filteredMics() {
  return MICS.filter(m => {
    if (state.patternFilter !== 'all' && effectivePattern(m) !== state.patternFilter) return false;
    if (state.transducerFilter !== 'all' && m.transducer !== state.transducerFilter) return false;
    if (state.diaphragmFilter !== 'all' && m.diaphragm !== state.diaphragmFilter) return false;
    if (state.search && !m._name.toLowerCase().includes(state.search) && !(m.manufacturer||'').toLowerCase().includes(state.search)) return false;
    return true;
  });
}

function makeMicItem(m) {
  const isCompare = state.compare.includes(m.id);
  const compIdx = state.compare.indexOf(m.id);
  const colorIdx = isCompare ? compIdx + 1 : -1;
  const color = colorIdx >= 0 ? COLORS[colorIdx] : 'transparent';
  const borderColor = colorIdx >= 0 ? color : 'transparent';

  const item = document.createElement('div');
  let cls = 'mic-item';
  if (isCompare) cls += ` compare-${compIdx + 1}`;
  item.className = cls;
  item.dataset.micId = m.id;

  item.innerHTML = `
    <div class="mic-dot" style="background:${color};border:1px solid ${borderColor}"></div>
    <div class="mic-item-info">
      <div class="mic-item-name">${m.model}</div>
      <div class="mic-item-sub">${PATTERN_LABELS[effectivePattern(m)]||m.pattern} · ${m.sensitivity_mV_Pa} mV/Pa${m.connector_variants ? '<br><span style="font-size:10px;color:var(--text-faint)">MV400X (XLR) · MV400L (LEMO)</span>' : ''}</div>
    </div>
    <input type="checkbox" class="mic-item-cb" ${isCompare ? 'checked' : ''} style="accent-color:${COLORS[isCompare ? compIdx+1 : 1]}">
  `;
  item.querySelector('.mic-item-info').onclick = () => { state.selected = m.id; renderAll(); };
  item.querySelector('.mic-item-cb').onchange = e => {
    if (e.target.checked) {
      if (!state.compare.includes(m.id) && state.compare.length < 3) state.compare.push(m.id);
      else e.target.checked = false;
    } else {
      state.compare = state.compare.filter(id => id !== m.id);
    }
    renderAll();
  };
  return item;
}

// Track collapsed state
const treeState = { mfr: {}, series: {} };

function renderMicList() {
  const list = document.getElementById('mic-list');
  const mics = filteredMics();
  document.getElementById('mic-count').textContent = `${mics.length} microphone${mics.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';

  // Group: manufacturer → series → mics
  const byMfr = {};
  mics.forEach(m => {
    const mfr = m.manufacturer || '?';
    const ser = m.series || '–';
    if (!byMfr[mfr]) byMfr[mfr] = {};
    if (!byMfr[mfr][ser]) byMfr[mfr][ser] = [];
    byMfr[mfr][ser].push(m);
  });

  Object.keys(byMfr).sort().forEach(mfr => {
    const mfrKey = mfr;
    if (!(mfrKey in treeState.mfr)) treeState.mfr[mfrKey] = false; // open by default
    const collapsed = treeState.mfr[mfrKey];

    const mfrEl = document.createElement('div');
    mfrEl.className = 'tree-mfr' + (collapsed ? ' collapsed' : '');

    const mfrHdr = document.createElement('div');
    mfrHdr.className = 'tree-mfr-header';
    mfrHdr.innerHTML = `<span class="tree-caret">▾</span>${mfr}`;
    mfrHdr.onclick = () => {
      treeState.mfr[mfrKey] = !treeState.mfr[mfrKey];
      mfrEl.classList.toggle('collapsed', treeState.mfr[mfrKey]);
    };
    mfrEl.appendChild(mfrHdr);

    const seriesContainer = document.createElement('div');
    seriesContainer.className = 'tree-series-items';

    Object.keys(byMfr[mfr]).sort().forEach(ser => {
      const serKey = mfr + '::' + ser;
      if (!(serKey in treeState.series)) treeState.series[serKey] = false;
      const serCollapsed = treeState.series[serKey];

      const serEl = document.createElement('div');
      serEl.className = 'tree-series' + (serCollapsed ? ' collapsed' : '');

      // Only show series header if there are multiple series for this manufacturer
      const multiSeries = Object.keys(byMfr[mfr]).length > 1;
      if (multiSeries) {
        const serHdr = document.createElement('div');
        serHdr.className = 'tree-series-header';
        serHdr.innerHTML = `<span class="tree-series-caret">▾</span>${ser}`;
        serHdr.onclick = () => {
          treeState.series[serKey] = !treeState.series[serKey];
          serEl.classList.toggle('collapsed', treeState.series[serKey]);
        };
        serEl.appendChild(serHdr);
      }

      const itemsEl = document.createElement('div');
      itemsEl.className = 'tree-series-items';
      if (!multiSeries) itemsEl.style.paddingLeft = '0';

      byMfr[mfr][ser].forEach(m => {
        itemsEl.appendChild(makeMicItem(m));
      });

      serEl.appendChild(itemsEl);
      seriesContainer.appendChild(serEl);
    });

    mfrEl.appendChild(seriesContainer);
    list.appendChild(mfrEl);
  });

  // re-sync filter chips across all filter groups
  document.querySelectorAll('.filter-chip').forEach(btn => {
    const key = btn.dataset.filterKey;
    const val = btn.dataset.filterVal;
    if (key && val !== undefined) btn.classList.toggle('active', state[key] === val);
  });

  // re-sync compare color dots without full re-render
  document.querySelectorAll('.mic-item').forEach(item => {
    const id = item.dataset.micId;
    if (!id) return;
    const compIdx = state.compare.indexOf(id);
    const isCompare = compIdx >= 0;
    const colorIdx = isCompare ? compIdx+1 : -1;
    const color = colorIdx >= 0 ? COLORS[colorIdx] : 'transparent';
    const dot = item.querySelector('.mic-dot');
    if (dot) { dot.style.background = color; dot.style.border = `1px solid ${color}`; }
    const cb = item.querySelector('.mic-item-cb');
    if (cb) {
      cb.checked = isCompare;
      cb.style.accentColor = isCompare ? COLORS[compIdx+1] : '';
    }
    item.className = 'mic-item' + (isCompare ? ` compare-${compIdx+1}` : '');
  });


}

function buildSpecTable(mics) {
  if (!mics.length) return '';
  let html = '<div class="spec-table-wrap"><table class="spec-table"><thead><tr><th>Specification</th>';
  mics.forEach((m,i) => {
    const base = imgBasePath(m);
    const url = m.product_url || '';
    html += `<th class="mic-col" style="min-width:140px;vertical-align:bottom;padding-bottom:8px">
      <img class="th-mic-img" data-base="${base}" alt="${m.manufacturer} ${m.model}">
      <div class="th-mic-img-placeholder" style="display:none">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".4"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      ${url ? `<a class="mic-link-btn" href="${url}" target="_blank" rel="noopener">Product page ↗</a>` : ''}
      <div style="margin-top:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${COLORS[i+1]};margin-right:5px"></span>${m.manufacturer} ${m.model}</div>
    </th>`;
  });
  html += '</tr></thead><tbody>';

  SPEC_ROWS.forEach(row => {
    const vals = mics.map(m => m[row.key]);
    if (!vals.some(v => v !== undefined && v !== null)) return;
    html += `<tr><td class="row-label">${row.label}</td>`;
    vals.forEach((v,i) => {
      if (v === undefined || v === null) { html += '<td>—</td>'; return; }
      let cls = '';
      if (mics.length > 1 && row.higher_better !== undefined) {
        const nums = vals.filter(x=>x!=null).map(Number);
        const best  = row.higher_better ? Math.max(...nums) : Math.min(...nums);
        const worst = row.higher_better ? Math.min(...nums) : Math.max(...nums);
        if (nums.filter(n=>n===best).length===1  && Number(v)===best)  cls=' class="best"';
        if (nums.filter(n=>n===worst).length===1 && Number(v)===worst) cls=' class="worst"';
      }
      html += `<td${cls}>${row.fmt(v, mics[i])}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ── polar diagram ───────────────────────────────────────────
function drawPolar(canvas, mic, freqHz, color) {
  const dpr = window.devicePixelRatio || 1;
  const size = canvas.offsetWidth || 200;
  canvas.width = size * dpr; canvas.height = size * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = size/2, cy = size/2, maxR = size*0.40;
  const dark = matchMedia('(prefers-color-scheme:dark)').matches;
  const gc = dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
  const tc = dark ? 'rgba(255,255,255,0.38)' : 'rgba(0,0,0,0.36)';
  const DB_MAX = 24;

  ctx.clearRect(0,0,size,size);
  [0,6,12,18,24].forEach(db => {
    const r = maxR*(1-db/DB_MAX);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.stroke();
    if (db > 0) {
      ctx.font = `${Math.round(size*0.048)}px -apple-system,sans-serif`;
      ctx.fillStyle = tc; ctx.textAlign = 'center';
      ctx.fillText('-'+db, cx+r*0.07, cy-r+size*0.04);
    }
  });
  [0,30,60,90,120,150].forEach(deg => {
    const rad = (deg-90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(rad)*maxR*1.03, cy+Math.sin(rad)*maxR*1.03);
    ctx.lineTo(cx-Math.cos(rad)*maxR*1.03, cy-Math.sin(rad)*maxR*1.03);
    ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.stroke();
    const lbs={0:'0°',30:'30°',60:'60°',90:'90°',120:'120°',150:'150°'};
    const opp={0:'180°',30:'210°',60:'240°',90:'270°',120:'300°',150:'330°'};
    const fs = Math.round(size*0.048);
    ctx.font = `${fs}px -apple-system,sans-serif`;
    ctx.fillStyle = tc; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillText(lbs[deg], cx+Math.cos(rad)*(maxR+size*0.07), cy+Math.sin(rad)*(maxR+size*0.07));
    ctx.fillText(opp[deg], cx-Math.cos(rad)*(maxR+size*0.07), cy-Math.sin(rad)*(maxR+size*0.07));
  });

  const _pd = getActiveMicData(mic).polar_data || mic.polar_data;
  if (!mic || !_pd) return;
  const keys = Object.keys(_pd).map(Number).sort((a,b)=>a-b);
  const freq = keys.reduce((b,k) => Math.abs(k-freqHz)<Math.abs(b-freqHz)?k:b, keys[0]);
  const vals = _pd[String(freq)];
  if (!vals) return;

  ctx.beginPath();
  for (let deg=0; deg<=360; deg++) {
    const tDeg = deg<=180 ? deg : 360-deg;
    const idx = tDeg/5;
    const lo = Math.floor(idx), hi = Math.min(Math.ceil(idx),36);
    const atten = vals[lo] + (idx-lo)*(vals[hi]-vals[lo]);
    const r = maxR*Math.max(0, 1-atten/DB_MAX);
    const rad = (deg-90)*Math.PI/180;
    deg===0 ? ctx.moveTo(cx+Math.cos(rad)*r, cy+Math.sin(rad)*r)
             : ctx.lineTo(cx+Math.cos(rad)*r, cy+Math.sin(rad)*r);
  }
  ctx.closePath();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
}

// ── freq response chart ─────────────────────────────────────
function drawFreqResp(canvas, mics, markerHz) {
  const dpr = window.devicePixelRatio||1;
  const W = canvas.offsetWidth||400, H = 220;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const dark = matchMedia('(prefers-color-scheme:dark)').matches;
  const gc = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
  const tc = dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.38)';
  ctx.clearRect(0,0,W,H);

  const pad={l:36,r:12,t:12,b:28};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const DB_MIN=-30, DB_MAX=12;
  const xHz = hz => pad.l + Math.log10(hz/20)/Math.log10(20000/20)*cw;
  const yDb = db => pad.t + (DB_MAX-db)/(DB_MAX-DB_MIN)*ch;

  // dB grid
  [-30,-20,-10,0,10].forEach(db => {
    const y=yDb(db);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y);
    ctx.strokeStyle = db===0?(dark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.15)'):gc;
    ctx.lineWidth = db===0?1:0.5; ctx.stroke();
    ctx.font='10px -apple-system,sans-serif'; ctx.fillStyle=tc; ctx.textAlign='right';
    ctx.fillText(db+'dB', pad.l-4, y+3.5);
  });
  // Hz grid
  [20,50,100,200,500,1000,2000,5000,10000,20000].forEach(hz => {
    const x=xHz(hz);
    ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,pad.t+ch);
    ctx.strokeStyle=gc; ctx.lineWidth=0.5; ctx.stroke();
    const lbl={20:'20',100:'100',1000:'1k',10000:'10k',20000:'20k'}[hz];
    if(lbl){ctx.font='10px -apple-system,sans-serif';ctx.fillStyle=tc;ctx.textAlign='center';ctx.fillText(lbl,x,pad.t+ch+16);}
  });
  ctx.font='10px -apple-system,sans-serif';ctx.fillStyle=tc;ctx.textAlign='center';
  ctx.fillText('Hz',pad.l+cw/2,H-4);

  // curves
  mics.forEach((m,mi) => {
    if(!m||!m.freq_response) return;
    const color = COLORS[mi+1];
    const fqRespData = getMicFreqResponse(m);
    const fqAngles = Object.keys(fqRespData).sort((a,b)=>{
        // 0deg first, then by angle number
        if(a==='0deg') return -1; if(b==='0deg') return 1;
        return parseInt(a)-parseInt(b);
      });
    fqAngles.forEach((ang,ai) => {
      const fr = fqRespData[ang]; if(!fr) return;
      const pts = Object.entries(fr).map(([h,d])=>[+h,d]).sort((a,b)=>a[0]-b[0]).filter(p=>p[0]>=10&&p[0]<=25000);
      if(!pts.length) return;
      ctx.beginPath();
      pts.forEach(([hz,db],i) => { const x=xHz(hz),y=yDb(db); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.strokeStyle=color; ctx.lineWidth=ai===0?1.8:1;
      const dashPat=[[],[4,3],[2,4],[6,2,2,2],[8,3]][ai]||[4,3];
      ctx.setLineDash(dashPat); ctx.stroke(); ctx.setLineDash([]);
    });
  });

  // freq marker — color matches freq-display and polar labels (COLORS[0] of selected)
  if(markerHz>=20&&markerHz<=20000){
    const x=xHz(markerHz);
    ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,pad.t+ch);
    ctx.strokeStyle=COLORS[1]; ctx.lineWidth=1.5; ctx.setLineDash([3,2]); ctx.stroke(); ctx.setLineDash([]);
    const lbl=markerHz>=1000?(markerHz/1000).toFixed(markerHz%1000===0?0:1)+' kHz':markerHz+' Hz';
    ctx.font='10px -apple-system,sans-serif'; ctx.fillStyle=COLORS[1]; ctx.textAlign='left';
    ctx.fillText(lbl, Math.min(x+3, pad.l+cw-30), pad.t+12);
  }

  // legend drawn dynamically in HTML below canvas
}

// ── freq response legend ────────────────────────────────────
function updateFqLegend(mics) {
  const el = document.getElementById('fq-legend');
  if (!el) return;
  const DASH_LABELS = ['solid','dashed','dotted','dash-dot','long-dash'];
  const DASH_CSS = ['─────','- - -','· · ·','─ · ─','── ──'];
  const ANGLE_LABELS = {
    '0deg':'0°','30deg':'30°','60deg':'60°','90deg':'90°',
    '135deg':'135°','140deg':'140°','180deg':'180°'
  };

  // Collect all unique angles across selected mics
  const allAngles = new Set();
  mics.forEach(m => { if(m) Object.keys(getMicFreqResponse(m)).forEach(a => allAngles.add(a)); });
  const angles = [...allAngles].sort((a,b) => {
    if(a==='0deg') return -1; if(b==='0deg') return 1;
    return parseInt(a)-parseInt(b);
  });

  if(angles.length === 0) { el.textContent = ''; return; }

  // Build legend
  let parts = angles.map((ang, ai) => {
    const lbl = ANGLE_LABELS[ang] || ang.replace('deg','°');
    const dash = DASH_CSS[ai] || '─────';
    return `<span style="margin-right:12px;white-space:nowrap">`
      + `<span style="font-family:monospace;letter-spacing:-1px">${dash}</span> ${lbl}</span>`;
  });

  // If more than 2 angles, add note
  let note = '';
  if(angles.length > 2) {
    note = `<span style="color:var(--text-faint);margin-left:4px">`
      + `(${angles.length} measurement angles)</span>`;
  } else if(angles.length === 1) {
    note = '<span style="color:var(--text-faint)">(on-axis only)</span>';
  }

  el.innerHTML = parts.join('') + note;
}

// ── noise calculator ────────────────────────────────────────
const PRESETS = [
  {name:'Mono',n:1},{name:'AB / XY',n:2},{name:'ORTF',n:2},
  {name:'Decca Tree',n:3},{name:'Decca + outriggers',n:5},
  {name:'Surround 5.1',n:6},{name:'Orchestra array',n:8},
];

function calcNoise(mic, n, mode) {
  const s = mic.sensitivity_dBV_Pa;
  const noise = mode==='IEC' ? mic.noise_IEC_dBA : mic.noise_CCIR_dB;
  const ein = noise - s;
  const total = 10*Math.log10(Math.pow(10,ein/10)*n);
  return {ein:ein.toFixed(1), total:total.toFixed(1), noise, sens:s.toFixed(2)};
}

  return `
  <div class="noise-calc">
    <div class="noise-inputs">

        <label>Noise standard</label>
        <select id="noise-mode" onchange="updateNoise()">
          <option value="IEC" ${state.noiseMode==='IEC'?'selected':''}>IEC 268-4 dB(A) — default</option>
          <option value="CCIR" ${state.noiseMode==='CCIR'?'selected':''}>CCIR 468-4</option>
        </select>
      </div>
      <div class="noise-field">
        <label>Number of microphones (N)</label>
        <input type="number" id="noise-n" value="${state.noiseN}" min="1" max="64" onchange="updateNoise()">
      </div>
    </div>
    <div class="noise-presets">${PRESETS.map(p=>`<button class="noise-preset" onclick="setPreset(${p.n})">${p.name} (${p.n})</button>`).join('')}</div>
    <div class="noise-table-wrap">
      <table class="noise-table">

        </tr></thead>
        <tbody id="noise-tbody"></tbody>
      </table>
    </div>
  </div>`;
}

function renderNoiseTable() {
  const tbody = document.getElementById('noise-tbody'); if(!tbody) return;
  const th = document.getElementById('noise-th-n'); if(th) th.textContent=`EIN (N=${state.noiseN})`;
  const mics = getActiveMics();
  if(!mics.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:1rem">Select microphones to compare noise performance</td></tr>';return;}

  const rows = mics.map((m,i)=>({m,i,...calcNoise(m,state.noiseN,state.noiseMode)}));
  rows.sort((a,b)=>parseFloat(a.total)-parseFloat(b.total));
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td><span class="mic-card-dot" style="background:${COLORS[r.i+1]}"></span>${r.m.manufacturer} ${r.m.model}</td>
      <td>${r.sens} dBV/Pa</td>
      <td>${r.noise} ${state.noiseMode==='IEC'?'dB(A)':'dB'}</td>
      <td>${r.ein} dB</td>
      <td>${r.total} dB</td>
    </tr>`).join('');
}

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
            <h3 style="margin-bottom:0">Polar diagram — <span id="polar-title-freq" style="color:${COLORS[1]}">${freqLabel}</span></h3>
            <button id="overlay-btn" onclick="toggleOverlay()"
              style="font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border-strong);
                     background:${state.polarOverlay?COLORS[1]:'transparent'};
                     color:${state.polarOverlay?'#fff':'var(--text-muted)'};cursor:pointer">
              Overlay
            </button>
          </div>
          <div class="polar-grid" id="polar-grid" style="grid-template-columns:repeat(${cols},1fr)"></div>
          <canvas id="polar-overlay-canvas" style="display:none;width:100%;height:280px;margin:0 auto;max-width:400px"></canvas>
        </div>
        <div class="diagram-card">
          <h3>Frequency response</h3>
          <canvas class="freqresp-canvas" id="freqresp-canvas"></canvas>
          <div id="fq-legend" style="margin-top:6px;font-size:11px;color:var(--text-muted);line-height:1.8"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Noise performance comparison</div>
      ${buildNoiseCalc()}
    </div>
  `;

  // polar canvases
  const grid = document.getElementById('polar-grid');
  const overlayCanvas = document.getElementById('polar-overlay-canvas');
  if (state.polarOverlay && mics.length > 0) {
    grid.style.display = 'none';
    overlayCanvas.style.display = 'block';
    overlayCanvas.style.cssText = 'display:block;width:100%;max-width:280px;height:280px;margin:0 auto';
    // Set canvas to a concrete px size so offsetWidth > 0
    const _ow = overlayCanvas.parentElement ? overlayCanvas.parentElement.clientWidth || 280 : 280;
    overlayCanvas.style.width = _ow + 'px';
    overlayCanvas.style.height = _ow + 'px';
    requestAnimationFrame(() => drawOverlayPolar(overlayCanvas, mics, state.freq));
  } else {
    grid.style.display = '';
    overlayCanvas.style.display = 'none';
    mics.forEach((m,i) => {
      const item = document.createElement('div'); item.className='polar-item';
      const lbl = document.createElement('div'); lbl.className='polar-label';
      lbl.style.color = COLORS[i+1];
      lbl.textContent = `${m.manufacturer} ${m.model}`;
      const cv = document.createElement('canvas'); cv.className='polar-canvas';
      cv.style.cssText='width:100%;max-width:200px;height:200px';
      item.appendChild(lbl); item.appendChild(cv);
      grid.appendChild(item);
      requestAnimationFrame(() => drawPolar(cv, m, state.freq, COLORS[i+1]));
    });
  }

  // freq response
  requestAnimationFrame(() => {
    const cv = document.getElementById('freqresp-canvas');
    if(cv) drawFreqResp(cv, mics, state.freq);
    updateFqLegend(mics);
  });

  // slider
  document.getElementById('freq-slider').oninput = e => {
    state.freq = POLAR_FREQS[+e.target.value];
    updateDiagrams();
  };

  renderNoiseTable();
  requestAnimationFrame(initTableImages);
}

function setFreq(hz) {
  state.freq = hz;
  const sl = document.getElementById('freq-slider');
  const idx = POLAR_FREQS.indexOf(hz);
  if(sl && idx>=0) sl.value = idx;
  updateDiagrams();
}

function toggleOverlay() {
  state.polarOverlay = !state.polarOverlay;
  renderContent();
}

function drawOverlayPolar(canvas, mics, freqHz) {
  const DB_MAX = 24;
  const dpr = window.devicePixelRatio || 1;
  // Use explicit size so canvas renders even when just made visible
  const size = Math.max(canvas.offsetWidth, 280);
  canvas.width = size * dpr; canvas.height = size * dpr;
  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, size, size);
  const cx = size/2, cy = size/2, maxR = size * 0.38;
  const dark = matchMedia('(prefers-color-scheme:dark)').matches;
  const gc = dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
  const tc = dark ? 'rgba(255,255,255,0.38)' : 'rgba(0,0,0,0.36)';

  // Grid rings
  [0,6,12,18,24].forEach(db => {
    const r = maxR*(1-db/DB_MAX);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.stroke();
    if (db > 0) {
      ctx.font = '9px -apple-system,sans-serif';
      ctx.fillStyle = tc; ctx.textAlign = 'center';
      ctx.fillText('-'+db, cx+r*0.07, cy-r+10);
    }
  });
  // Spokes
  [0,30,60,90,120,150].forEach(deg => {
    const rad = (deg-90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(rad)*maxR*1.03, cy+Math.sin(rad)*maxR*1.03);
    ctx.lineTo(cx-Math.cos(rad)*maxR*1.03, cy-Math.sin(rad)*maxR*1.03);
    ctx.strokeStyle = gc; ctx.lineWidth = 0.5; ctx.stroke();
  });
  // Angle labels
  const lbs={0:'0°',30:'30°',60:'60°',90:'90°',120:'120°',150:'150°'};
  const opp={0:'180°',30:'210°',60:'240°',90:'270°',120:'300°',150:'330°'};
  ctx.font = '9px -apple-system,sans-serif'; ctx.fillStyle = tc; ctx.textBaseline='middle';
  [0,30,60,90,120,150].forEach(deg => {
    const rad=(deg-90)*Math.PI/180;
    ctx.textAlign='center';
    ctx.fillText(lbs[deg], cx+Math.cos(rad)*(maxR+14), cy+Math.sin(rad)*(maxR+14));
    ctx.fillText(opp[deg], cx-Math.cos(rad)*(maxR+14), cy-Math.sin(rad)*(maxR+14));
  });

  // Data curves — same interpolation logic as drawPolar
  mics.forEach((m, mi) => {
    const _mpd = getActiveMicData(m).polar_data || m.polar_data;
    if (!m || !_mpd) return;
    const keys = Object.keys(_mpd).map(Number).sort((a,b)=>a-b);
    const freq = keys.reduce((b,k) => Math.abs(k-freqHz)<Math.abs(b-freqHz)?k:b, keys[0]);
    const vals = _mpd[String(freq)];
    if (!vals) return;
    const color = COLORS[mi + 1];
    ctx.beginPath();
    for (let deg=0; deg<=360; deg++) {
      const tDeg = deg<=180 ? deg : 360-deg;
      const idx = tDeg/5;
      const lo = Math.floor(idx), hi = Math.min(Math.ceil(idx),36);
      const atten = vals[lo] + (idx-lo)*(vals[hi]-vals[lo]);
      const r = maxR*Math.max(0, 1-atten/DB_MAX);
      const rad = (deg-90)*Math.PI/180;
      deg===0 ? ctx.moveTo(cx+Math.cos(rad)*r, cy+Math.sin(rad)*r)
               : ctx.lineTo(cx+Math.cos(rad)*r, cy+Math.sin(rad)*r);
    }
    ctx.closePath();
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  });

  // Legend labels
  ctx.textBaseline = 'alphabetic';
  mics.forEach((m, mi) => {
    ctx.fillStyle = COLORS[mi + 1];
    ctx.font = 'bold 10px -apple-system,sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(m.model, 6, 14 + mi * 14);
  });
}

function updateDiagrams() {
  const mics = getActiveMics();
  const lbl = fmtFreq(state.freq);

  // update text labels
  const fl = document.getElementById('freq-label'); if(fl){fl.textContent=lbl;fl.style.color=COLORS[1];}
  const pt = document.getElementById('polar-title-freq'); if(pt){pt.textContent=lbl;pt.style.color=COLORS[1];}

  // update freq buttons
  document.querySelectorAll('.freq-btn').forEach(btn => {
    const f = QUICK_FREQS.find(f => fmtFreq(f) === btn.textContent);
    const active = f === state.freq;
    btn.classList.toggle('active', active);
    btn.style.background = active ? COLORS[1] : '';
    btn.style.color = active ? '#fff' : '';
    btn.style.borderColor = active ? COLORS[1] : '';
  });

  // redraw polars
  if (state.polarOverlay) {
    const oc = document.getElementById('polar-overlay-canvas');
    if (oc) {
      const _ow2 = oc.parentElement ? oc.parentElement.clientWidth || 280 : 280;
      oc.style.width = _ow2 + 'px'; oc.style.height = _ow2 + 'px';
      requestAnimationFrame(() => drawOverlayPolar(oc, mics, state.freq));
    }
  } else {
    const canvases = document.querySelectorAll('.polar-canvas');
    canvases.forEach((cv,i) => { if(mics[i]) drawPolar(cv, mics[i], state.freq, COLORS[i+1]); });
  }

  // redraw freq response
  const frcv = document.getElementById('freqresp-canvas');
  if(frcv) drawFreqResp(frcv, mics, state.freq);
  updateFqLegend(mics);
}

function fmtFreq(hz) {
  return hz >= 1000 ? (hz/1000).toFixed(hz%1000===0?0:1)+' kHz' : hz+' Hz';
}

// ── globals exposed for inline handlers ─────────────────────
window.updateNoise = function() {
  state.noiseMode = document.getElementById('noise-mode').value;
  state.noiseN = parseInt(document.getElementById('noise-n').value)||1;
  renderNoiseTable();
};
window.setPreset = function(n) {
  state.noiseN = n;
  const el = document.getElementById('noise-n'); if(el) el.value = n;
  renderNoiseTable();
};
window.setFreq = setFreq;

// ── init ────────────────────────────────────────────────────
buildSidebar();
renderMicList();
renderContent();

window.addEventListener('resize', () => {
  const mics = getActiveMics();
  document.querySelectorAll('.polar-canvas').forEach((cv,i) => { if(mics[i]) drawPolar(cv,mics[i],state.freq,COLORS[i+1]); });
  const frcv = document.getElementById('freqresp-canvas');
  if(frcv) drawFreqResp(frcv, mics, state.freq);
  updateFqLegend(mics);
});
</script>
</body>
</html>
